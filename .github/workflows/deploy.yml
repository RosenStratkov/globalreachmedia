name: Deploy PHP App to Cloud Run

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/php-app:latest .

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/php-app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy php-app \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/php-app:latest \
            --region europe-west1 \
            --allow-unauthenticated

      - name: Get Cloud Run URL
        run: |
          gcloud run services describe php-app \
            --region europe-west1 \
            --format 'value(status.url)'
