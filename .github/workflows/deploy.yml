name: Deploy PHP App to Cloud Run

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          version: latest
      
      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/php-app:latest .

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/php-app:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy php-app \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/php-app:latest \
            --region europe-west1 \
            --allow-unauthenticated \
            --add-cloudsql-instances project-48d23e34-31d5-4d55-91d:europe-west1:my-sql-instance \
            --set-env-vars CLOUD_SQL_CONNECTION_NAME=project-48d23e34-31d5-4d55-91d:europe-west1:my-sql-instance,DB_NAME=mydb,DB_USER=admin,DB_PASSWORD=PaSStest!123 \
            --quiet

      - name: Get Cloud Run URL
        run: |
          gcloud run services describe php-app \
            --region europe-west1 \
            --format 'value(status.url)'
